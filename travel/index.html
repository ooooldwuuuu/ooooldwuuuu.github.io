<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濟州島 & 釜山之旅</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        /* Simple animation for modal */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-animate {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-20">

    <div id="app">
        <!-- Header -->
        <header class="bg-white shadow-sm sticky top-0 z-10">
            <div class="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                        <i data-lucide="plane" class="text-blue-600"></i>
                        濟州島 & 釜山之旅
                    </h1>
                    <p class="text-xs text-slate-500 mt-1">12/14 - 12/21 (8天7夜)</p>
                </div>
                <button onclick="resetData()" class="text-xs flex items-center gap-1 text-slate-400 hover:text-red-500 transition-colors">
                    <i data-lucide="rotate-ccw" width="14" height="14"></i> 重置
                </button>
            </div>

            <!-- Date Tabs -->
            <div class="overflow-x-auto no-scrollbar border-t border-slate-100 bg-white">
                <div class="flex px-4 py-2 min-w-max gap-2 max-w-3xl mx-auto" id="date-tabs">
                    <!-- Tabs will be injected here by JS -->
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-3xl mx-auto px-4 py-6">
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-lg font-bold text-slate-700 flex items-center gap-2" id="current-date-label">
                    <!-- Date Label injected here -->
                </h2>
                <button onclick="openModal(true)" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm flex items-center gap-1 hover:bg-blue-700 shadow-sm active:scale-95 transition-all">
                    <i data-lucide="plus" width="16" height="16"></i> 新增
                </button>
            </div>

            <div class="space-y-4 relative" id="schedule-list">
                <!-- Vertical Line -->
                <div class="absolute left-[27px] top-4 bottom-4 w-0.5 bg-slate-200 z-0"></div>
                <!-- Events will be injected here by JS -->
            </div>
        </main>

        <!-- Edit/Add Modal -->
        <div id="edit-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden modal-animate">
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="font-bold text-lg text-slate-800" id="modal-title">
                        新增行程
                    </h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                        <i data-lucide="x" width="24" height="24"></i>
                    </button>
                </div>
                
                <form id="event-form" onsubmit="handleSaveEvent(event)" class="p-6 space-y-4">
                    <input type="hidden" id="event-id">
                    <input type="hidden" id="event-is-new">

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">時間</label>
                            <input type="time" id="event-time" class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">類型</label>
                            <select id="event-type" class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                <!-- Options injected by JS -->
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">標題</label>
                        <input type="text" id="event-title" required placeholder="行程名稱" class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Google Maps 連結 (選填)</label>
                        <div class="relative">
                            <div class="absolute left-3 top-2.5 text-slate-400">
                                <i data-lucide="external-link" width="16" height="16"></i>
                            </div>
                            <input type="url" id="event-location" placeholder="https://maps.app.goo.gl/..." class="w-full border border-slate-200 rounded-lg pl-9 pr-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Naver Map 連結 (選填)</label>
                        <div class="relative">
                            <div class="absolute left-3 top-2.5 text-slate-400">
                                <i data-lucide="map" width="16" height="16"></i>
                            </div>
                            <input type="url" id="event-naverLink" placeholder="https://naver.me/..." class="w-full border border-slate-200 rounded-lg pl-9 pr-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">備註 (選填)</label>
                        <textarea id="event-note" rows="3" class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm"></textarea>
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors flex justify-center items-center gap-2">
                            <i data-lucide="save" width="18" height="18"></i> 儲存行程
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>

            spot: { icon: 'camera', label: '景點', color: 'bg-emerald-100 text-emerald-700' },

        const DATES = [

            { key: "2024-12-19", label: "12/19 (五)", city: "釜山" },
            { key: "2024-12-20", label: "12/20 (六)", city: "釜山" },
            { key: "2024-12-21", label: "12/21 (日)", city: "返程" },

        const INITIAL_DATA = {
            "2024-12-14": [
                { id: 1, time: "06:40", title: "起飛：台北(TPE T1) -> 濟州(CJU)", type: "flight", note: "抵達時間 09:50", location: "", naverLink: "" },
                { id: 2, time: "10:30", title: "機場辦 WOWPASS", type: "other", note: "", location: "", naverLink: "" },
                { id: 3, time: "11:00", title: "租車：Jeju one car", type: "transport", note: "搭接駁巴士前往取車", location: "", naverLink: "" },

                { id: 5, time: "11:30", title: "倫敦貝果", type: "food", note: "", location: "https://maps.app.goo.gl/Xf2xyxCZe4mkhL9BA", naverLink: "" },
                { id: 6, time: "12:30", title: "午餐：萬金麵條", type: "food", note: "視情況決定是否用餐", location: "https://maps.app.goo.gl/1i8Pjgxx5F7DjhZt9", naverLink: "" },
                { id: 7, time: "14:00", title: "山君不離", type: "spot", note: "芒草小徑", location: "https://maps.app.goo.gl/1XAjgWjS3FKBY4yy8", naverLink: "" },
                { id: 8, time: "15:00", title: "Cafe the container", type: "cafe", note: "採橘子體驗", location: "https://maps.app.goo.gl/gpw4Gun3KLcv4djk7", naverLink: "" },
                { id: 9, time: "16:00", title: "Secret Forest 神秘森林", type: "spot", note: "拍照", location: "https://maps.app.goo.gl/AYbz7M1b32EAzuit8", naverLink: "" },
                { id: 10, time: "17:00", title: "山茶花園 / 橘子咖啡", type: "cafe", note: "橘花閣樓 或 小巧可愛橘子咖啡廳", location: "https://maps.app.goo.gl/rYPNAxk3MANKGEE77", naverLink: "" },
                { id: 11, time: "18:30", title: "晚餐：滿足的商會", type: "food", note: "Naver 已預約", location: "https://maps.app.goo.gl/JYgwnhWND7DeLqR6A", naverLink: "" },
                { id: 12, time: "20:00", title: "Check-in: Agoda 阿賓斯", type: "stay", note: "12/16~18 入住", location: "https://maps.app.goo.gl/5XSmxeUw5k7hMuRb8", naverLink: "" },
            ],
            "2024-12-17": [
                { id: 1, time: "09:30", title: "orrrn 咖啡廳", type: "cafe", note: "", location: "https://maps.app.goo.gl/gMX4WBWXn5wa71Ni9", naverLink: "" },
                { id: 2, time: "11:00", title: "前往牛島", type: "transport", note: "每半小時一班船。末班回程 17:30", location: "", naverLink: "" },
                { id: 3, time: "12:00", title: "午餐：哈哈呵呵漢堡 / On-Off 炸豬排", type: "food", note: "", location: "https://maps.app.goo.gl/2jp6S8gai26qJ1zp8", naverLink: "" },
                { id: 4, time: "14:00", title: "BLANC ROCHER 咖啡廳", type: "cafe", note: "花生冰淇淋", location: "https://maps.app.goo.gl/7cjqmTCEYVuQQBCp7", naverLink: "" },
                { id: 5, time: "17:00", title: "返回濟州本島", type: "transport", note: "", location: "", naverLink: "" },
                { id: 6, time: "18:00", title: "偶來市場", type: "spot", note: "晚餐/逛街", location: "", naverLink: "" },
                { id: 7, time: "19:30", title: "備選：金岳 / 海豚樂園 / Arte / 熔岩咖啡", type: "spot", note: "視時間與體力安排", location: "https://maps.app.goo.gl/bR8kcauzTz5B3SUVA", naverLink: "" },
            ],
            "2024-12-18": [
                { id: 1, time: "10:30", title: "早餐：Egg Drop (機場內)", type: "food", note: "", location: "", naverLink: "" },
                { id: 2, time: "12:55", title: "起飛：濟州(CJU) -> 釜山(PUS)", type: "flight", note: "抵達時間 14:00", location: "", naverLink: "" },
                { id: 3, time: "15:00", title: "Check-in: Good Ol' Days Hotel", type: "stay", note: "12/18~21 入住", location: "https://maps.app.goo.gl/LsASgqmsWGpfGbw56", naverLink: "" },
                { id: 4, time: "16:00", title: "新世界百貨", type: "spot", note: "逛街", location: "https://maps.app.goo.gl/f7V87PQXrH4aqWPU7", naverLink: "" },
                { id: 5, time: "20:00", title: "消夜：橋村炸雞 / Namsun Chicken", type: "food", note: "Namsun 在住宿旁", location: "https://maps.app.goo.gl/Pp897AX5b9ZvyAdn8", naverLink: "" },
            ],
            "2024-12-19": [
                { id: 1, time: "09:30", title: "醫美：金陽濟", type: "other", note: "西面站", location: "", naverLink: "" },
                { id: 2, time: "12:30", title: "午餐：異世雞 Isegye", type: "food", note: "Catchtable 候位", location: "https://maps.app.goo.gl/b72mTRntr91F8w9E6", naverLink: "" },
                { id: 3, time: "14:00", title: "PUFF Bakery", type: "food", note: "買開心果麵包", location: "https://maps.app.goo.gl/xtzNJzdSsZKrwwW4A", naverLink: "" },
                { id: 4, time: "15:00", title: "白淺灘文化村 / 甘川洞文化村", type: "spot", note: "擇一前往", location: "", naverLink: "" },
                { id: 5, time: "17:00", title: "松島", type: "spot", note: "", location: "", naverLink: "" },
                { id: 6, time: "19:00", title: "富平罐頭市場 & BIFF廣場", type: "food", note: "晚餐與逛街", location: "", naverLink: "" },
            ],
            "2024-12-20": [
                { id: 1, time: "12:00", title: "午餐：Stone Street", type: "food", note: "葡萄起司烤餅", location: "https://maps.app.goo.gl/QmGWpFg47xmxBCht7", naverLink: "" },
                { id: 2, time: "15:30", title: "膠囊列車", type: "spot", note: "15:30~16:00 場次。登入:信箱 / 密碼:0906", location: "https://www.tbluelinepark.com/mypage/login_eng/GD2100036", naverLink: "" },
                { id: 3, time: "18:00", title: "廣安里無人機表演", type: "spot", note: "每週六晚上", location: "", naverLink: "" },
            ],
            "2024-12-21": [
                { id: 1, time: "11:00", title: "前往金海機場", type: "transport", note: "", location: "", naverLink: "" },
                { id: 2, time: "14:05", title: "起飛：釜山(PUS) -> 高雄(KHH)", type: "flight", note: "抵達時間 16:05", location: "", naverLink: "" },
            ]
        };

        // --- State Management ---
        let schedule = JSON.parse(localStorage.getItem('trip-schedule-v1')) || INITIAL_DATA;
        let selectedDate = "2024-12-14";

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            initTypeSelect();
            renderApp();
        });

        function saveData() {
            localStorage.setItem('trip-schedule-v1', JSON.stringify(schedule));
        }

        // --- Render Functions ---

        function renderApp() {
            renderDateTabs();
            renderScheduleList();
            renderHeaderLabel();
            // Re-initialize icons after DOM updates
            lucide.createIcons();
        }

        function renderHeaderLabel() {
            const dateObj = DATES.find(d => d.key === selectedDate);
            const labelEl = document.getElementById('current-date-label');
            labelEl.innerHTML = `<i data-lucide="calendar" width="18" height="18"></i> ${dateObj ? dateObj.label : ''} 行程`;
        }

        function renderDateTabs() {
            const container = document.getElementById('date-tabs');
            container.innerHTML = DATES.map(date => {
                const isSelected = selectedDate === date.key;
                const bgClass = isSelected ? 'bg-blue-600 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-100';
                const subTextClass = isSelected ? 'text-blue-100' : 'text-slate-400';
                
                return `
                    <button
                        onclick="switchDate('${date.key}')"
                        class="flex flex-col items-center px-4 py-2 rounded-xl text-sm transition-all ${bgClass}"
                    >
                        <span class="font-bold">${date.label}</span>
                        <span class="text-[10px] mt-0.5 ${subTextClass}">${date.city}</span>
                    </button>
                `;
            }).join('');
        }

        function renderScheduleList() {
            const container = document.getElementById('schedule-list');
            const events = schedule[selectedDate] || [];
            
            // Keep the vertical line
            const verticalLine = `<div class="absolute left-[27px] top-4 bottom-4 w-0.5 bg-slate-200 z-0"></div>`;

            if (events.length === 0) {
                container.innerHTML = `
                    ${verticalLine}
                    <div class="text-center py-10 text-slate-400 bg-white rounded-xl shadow-sm relative z-10 ml-12">
                        <p>這天還沒有行程，按右上角新增！</p>
                    </div>
                `;
                return;
            }

            const eventsHTML = events.map((event, index) => {
                const typeConfig = EVENT_TYPES[event.type] || EVENT_TYPES.other;
                
                // Map Icons and Naver Button Logic
                let mapButtons = '';
                if (event.location) {
                    mapButtons += `
                        <a href="${event.location}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-xs font-medium text-emerald-600 bg-emerald-50 px-2 py-1 rounded hover:bg-emerald-100 transition-colors">
                            <i data-lucide="map-pin" width="12" height="12"></i> Google Maps
                        </a>
                    `;
                }
                if (event.naverLink) {
                    mapButtons += `
                        <a href="${event.naverLink}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-xs font-medium text-green-600 bg-green-50 px-2 py-1 rounded hover:bg-green-100 transition-colors">
                            <i data-lucide="map" width="12" height="12"></i> Naver Map
                        </a>
                    `;
                }

                return `
                    <div class="relative z-0 group">
                        <div class="flex gap-4">
                            <!-- Timeline Icon -->
                            <div class="flex-shrink-0 relative z-10 bg-slate-50 py-1">
                                <div class="p-2 rounded-full ${typeConfig.color} shadow-sm">
                                    <i data-lucide="${typeConfig.icon}" width="20" height="20"></i>
                                </div>
                            </div>

                            <!-- Card -->
                            <div class="flex-grow bg-white p-4 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                                <div class="flex justify-between items-start">
                                    <div class="flex flex-col">
                                        <span class="text-sm font-bold text-blue-600 mb-0.5 font-mono">${event.time || "--:--"}</span>
                                        <h3 class="font-bold text-slate-800 text-lg leading-tight">${event.title}</h3>
                                    </div>
                                    
                                    <!-- Actions -->
                                    <div class="flex gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
                                         <div class="flex flex-col gap-1 mr-2">
                                           <button onclick="moveEvent(${index}, 'up')" ${index === 0 ? 'disabled class="p-1 opacity-30"' : 'class="p-1 hover:bg-slate-100 rounded text-slate-400 hover:text-blue-600"'}>
                                             <i data-lucide="arrow-up" width="14" height="14"></i>
                                           </button>
                                           <button onclick="moveEvent(${index}, 'down')" ${index === events.length - 1 ? 'disabled class="p-1 opacity-30"' : 'class="p-1 hover:bg-slate-100 rounded text-slate-400 hover:text-blue-600"'}>
                                             <i data-lucide="arrow-down" width="14" height="14"></i>
                                           </button>
                                         </div>
                                        <button onclick='openEditModal(${JSON.stringify(event).replace(/'/g, "&#39;")})' class="p-1.5 hover:bg-blue-50 text-slate-400 hover:text-blue-600 rounded-lg">
                                            <i data-lucide="edit-2" width="16" height="16"></i>
                                        </button>
                                        <button onclick="deleteEvent(${event.id})" class="p-1.5 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-lg">
                                            <i data-lucide="trash-2" width="16" height="16"></i>
                                        </button>
                                    </div>
                                </div>

                                ${event.note ? `<p class="text-sm text-slate-500 mt-2 bg-slate-50 p-2 rounded border border-slate-100">${event.note}</p>` : ''}

                                <div class="flex flex-wrap gap-2 mt-3">
                                    ${mapButtons}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = verticalLine + eventsHTML;
        }

        function initTypeSelect() {
            const select = document.getElementById('event-type');
            select.innerHTML = Object.entries(EVENT_TYPES).map(([key, value]) => 
                `<option value="${key}">${value.label}</option>`
            ).join('');
        }

        // --- Actions ---

        function switchDate(dateKey) {
            selectedDate = dateKey;
            renderApp();
        }

        function resetData() {
            if (confirm('確定要重置回原始行程嗎？所有自訂修改將會消失。')) {
                schedule = JSON.parse(JSON.stringify(INITIAL_DATA)); // Deep copy
                saveData();
                renderApp();
            }
        }

        function moveEvent(index, direction) {
            const events = [...schedule[selectedDate]];
            if (direction === 'up' && index > 0) {
                [events[index], events[index - 1]] = [events[index - 1], events[index]];
            } else if (direction === 'down' && index < events.length - 1) {
                [events[index], events[index + 1]] = [events[index + 1], events[index]];
            }
            schedule[selectedDate] = events;
            saveData();
            renderApp();
        }

        function deleteEvent(id) {
            if (confirm('確定要刪除此行程嗎？')) {
                schedule[selectedDate] = schedule[selectedDate].filter(e => e.id !== id);
                saveData();
                renderApp();
            }
        }

        // --- Modal Logic ---

        function openModal(isNew = true) {
            const modal = document.getElementById('edit-modal');
            const title = document.getElementById('modal-title');
            
            // Set Hidden Fields
            document.getElementById('event-is-new').value = isNew;
            
            if (isNew) {
                title.innerText = '新增行程';
                // Clear form
                document.getElementById('event-id').value = Date.now();
                document.getElementById('event-time').value = '';
                document.getElementById('event-type').value = 'spot';
                document.getElementById('event-title').value = '';
                document.getElementById('event-location').value = '';
                document.getElementById('event-naverLink').value = '';
                document.getElementById('event-note').value = '';
            }
            
            modal.classList.remove('hidden');
        }

        function openEditModal(event) {
            openModal(false);
            document.getElementById('modal-title').innerText = '編輯行程';
            
            document.getElementById('event-id').value = event.id;
            document.getElementById('event-time').value = event.time;
            document.getElementById('event-type').value = event.type;
            document.getElementById('event-title').value = event.title;
            document.getElementById('event-location').value = event.location;
            document.getElementById('event-naverLink').value = event.naverLink || '';
            document.getElementById('event-note').value = event.note;
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.add('hidden');
        }

        function handleSaveEvent(e) {
            e.preventDefault();
            
            const isNew = document.getElementById('event-is-new').value === 'true';
            const id = parseInt(document.getElementById('event-id').value);
            
            const newEvent = {
                id: id,
                time: document.getElementById('event-time').value,
                type: document.getElementById('event-type').value,
                title: document.getElementById('event-title').value,
                location: document.getElementById('event-location').value,
                naverLink: document.getElementById('event-naverLink').value,
                note: document.getElementById('event-note').value,
            };

            let currentEvents = schedule[selectedDate] || [];

            if (isNew) {
                currentEvents.push(newEvent);
            } else {
                currentEvents = currentEvents.map(ev => ev.id === id ? newEvent : ev);
            }

            // Sort by time
            currentEvents.sort((a, b) => a.time.localeCompare(b.time));

            schedule[selectedDate] = currentEvents;
            saveData();
            closeModal();
            renderApp();
        }

        // Close modal when clicking outside
        document.getElementById('edit-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

    </script>
</body>
</html>
